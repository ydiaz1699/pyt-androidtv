# ============================================================================
# Ejemplos de configuración de tarjetas Mushroom para pyt-androidtv
# ============================================================================
# Estas tarjetas funcionan directamente con la integración pyt_androidtv
# porque expone la entidad media_player con todas las features que
# Mushroom Media Card espera.
#
# Requisitos:
# 1. Tener pyt-androidtv instalado como integración en HA
# 2. Tener Mushroom instalado via HACS
# ============================================================================

# --- Tarjeta Media Player básica ---
# Muestra el estado, controles de reproducción y volumen
- type: custom:mushroom-media-player-card
  entity: media_player.android_tv_salon
  name: "Android TV Salón"
  icon: mdi:television
  use_media_info: true
  show_volume_level: true
  media_controls:
    - on_off
    - play_pause_stop
    - previous
    - next
  volume_controls:
    - volume_mute
    - volume_set
  layout: horizontal
  fill_container: true

# --- Tarjeta con controles colapsables ---
# Los controles se ocultan cuando el TV está apagado
- type: custom:mushroom-media-player-card
  entity: media_player.fire_tv_dormitorio
  name: "Fire TV Dormitorio"
  icon: mdi:fire
  use_media_info: true
  show_volume_level: true
  collapsible_controls: true
  media_controls:
    - on_off
    - play_pause_stop
  volume_controls:
    - volume_buttons
    - volume_mute

# --- Control remoto completo con chips ---
# Combina múltiples tarjetas para un control total
- type: vertical-stack
  cards:
    # Título
    - type: custom:mushroom-title-card
      title: "📺 Android TV"
      subtitle: "Control Remoto"

    # Estado principal con Mushroom Media
    - type: custom:mushroom-media-player-card
      entity: media_player.android_tv_salon
      use_media_info: true
      show_volume_level: true
      media_controls:
        - on_off
        - shuffle
        - previous
        - play_pause_stop
        - next
        - repeat
      volume_controls:
        - volume_mute
        - volume_set
      fill_container: true

    # Chips para acciones rápidas (apps favoritas)
    - type: custom:mushroom-chips-card
      chips:
        - type: action
          icon: mdi:netflix
          tap_action:
            action: call-service
            service: media_player.select_source
            data:
              entity_id: media_player.android_tv_salon
              source: com.netflix.ninja
        - type: action
          icon: mdi:youtube
          tap_action:
            action: call-service
            service: media_player.select_source
            data:
              entity_id: media_player.android_tv_salon
              source: com.google.android.youtube.tv
        - type: action
          icon: mdi:plex
          tap_action:
            action: call-service
            service: media_player.select_source
            data:
              entity_id: media_player.android_tv_salon
              source: com.plexapp.android
        - type: action
          icon: mdi:disney
          tap_action:
            action: call-service
            service: media_player.select_source
            data:
              entity_id: media_player.android_tv_salon
              source: com.disney.disneyplus
        - type: action
          icon: mdi:spotify
          tap_action:
            action: call-service
            service: media_player.select_source
            data:
              entity_id: media_player.android_tv_salon
              source: com.spotify.tv.android

    # Navegación D-pad con template card
    - type: horizontal-stack
      cards:
        - type: custom:mushroom-template-card
          primary: ""
          icon: mdi:arrow-up-bold
          layout: vertical
          tap_action:
            action: call-service
            service: remote.send_command
            data:
              entity_id: remote.android_tv_salon
              command: UP
        - type: custom:mushroom-template-card
          primary: ""
          icon: mdi:home
          layout: vertical
          tap_action:
            action: call-service
            service: remote.send_command
            data:
              entity_id: remote.android_tv_salon
              command: HOME

    - type: horizontal-stack
      cards:
        - type: custom:mushroom-template-card
          primary: ""
          icon: mdi:arrow-left-bold
          layout: vertical
          tap_action:
            action: call-service
            service: remote.send_command
            data:
              entity_id: remote.android_tv_salon
              command: LEFT
        - type: custom:mushroom-template-card
          primary: "OK"
          icon: mdi:checkbox-blank-circle
          layout: vertical
          tap_action:
            action: call-service
            service: remote.send_command
            data:
              entity_id: remote.android_tv_salon
              command: ENTER
        - type: custom:mushroom-template-card
          primary: ""
          icon: mdi:arrow-right-bold
          layout: vertical
          tap_action:
            action: call-service
            service: remote.send_command
            data:
              entity_id: remote.android_tv_salon
              command: RIGHT

    - type: horizontal-stack
      cards:
        - type: custom:mushroom-template-card
          primary: ""
          icon: mdi:arrow-down-bold
          layout: vertical
          tap_action:
            action: call-service
            service: remote.send_command
            data:
              entity_id: remote.android_tv_salon
              command: DOWN
        - type: custom:mushroom-template-card
          primary: ""
          icon: mdi:arrow-left
          layout: vertical
          tap_action:
            action: call-service
            service: remote.send_command
            data:
              entity_id: remote.android_tv_salon
              command: BACK

# --- Ejemplo de uso de servicios personalizados ---
# Llamar a servicios custom de pyt_androidtv desde botones Mushroom

# Toque en pantalla via servicio personalizado
- type: custom:mushroom-template-card
  primary: "Tap Centro"
  icon: mdi:gesture-tap
  tap_action:
    action: call-service
    service: pyt_androidtv.tap
    data:
      entity_id: media_player.android_tv_salon
      x: 960
      y: 540

# Escribir texto
- type: custom:mushroom-template-card
  primary: "Buscar Netflix"
  icon: mdi:keyboard
  tap_action:
    action: call-service
    service: pyt_androidtv.input_text
    data:
      entity_id: media_player.android_tv_salon
      text: "Mi pelicula favorita"
