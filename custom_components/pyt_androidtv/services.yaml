# Servicios personalizados de pyt_androidtv para Home Assistant

adb_command:
  name: Comando ADB
  description: Ejecutar un comando ADB shell personalizado en el dispositivo.
  fields:
    entity_id:
      name: Entidad
      description: La entidad media_player del dispositivo Android TV/Fire TV.
      required: true
      selector:
        entity:
          domain: media_player
          integration: pyt_androidtv
    command:
      name: Comando
      description: El comando ADB shell a ejecutar.
      required: true
      example: "dumpsys battery"
      selector:
        text:

tap:
  name: Toque en Pantalla
  description: Simular un toque en coordenadas específicas de la pantalla.
  fields:
    entity_id:
      name: Entidad
      description: La entidad media_player del dispositivo.
      required: true
      selector:
        entity:
          domain: media_player
          integration: pyt_androidtv
    x:
      name: Coordenada X
      description: Posición horizontal en píxeles.
      required: true
      selector:
        number:
          min: 0
          max: 3840
          mode: box
    y:
      name: Coordenada Y
      description: Posición vertical en píxeles.
      required: true
      selector:
        number:
          min: 0
          max: 2160
          mode: box

swipe:
  name: Deslizamiento en Pantalla
  description: Simular un deslizamiento (swipe) en la pantalla.
  fields:
    entity_id:
      name: Entidad
      description: La entidad media_player del dispositivo.
      required: true
      selector:
        entity:
          domain: media_player
          integration: pyt_androidtv
    x1:
      name: X Inicio
      description: Coordenada X del punto de inicio.
      required: true
      selector:
        number:
          min: 0
          max: 3840
          mode: box
    y1:
      name: Y Inicio
      description: Coordenada Y del punto de inicio.
      required: true
      selector:
        number:
          min: 0
          max: 2160
          mode: box
    x2:
      name: X Final
      description: Coordenada X del punto final.
      required: true
      selector:
        number:
          min: 0
          max: 3840
          mode: box
    y2:
      name: Y Final
      description: Coordenada Y del punto final.
      required: true
      selector:
        number:
          min: 0
          max: 2160
          mode: box
    duration_ms:
      name: Duración (ms)
      description: Duración del deslizamiento en milisegundos.
      default: 300
      selector:
        number:
          min: 100
          max: 5000
          mode: slider

input_text:
  name: Escribir Texto
  description: Escribir texto en el campo de entrada activo del dispositivo.
  fields:
    entity_id:
      name: Entidad
      description: La entidad media_player del dispositivo.
      required: true
      selector:
        entity:
          domain: media_player
          integration: pyt_androidtv
    text:
      name: Texto
      description: El texto a escribir en el dispositivo.
      required: true
      example: "Hola Mundo"
      selector:
        text:

search_in_app:
  name: Buscar en App
  description: Abrir una aplicación y escribir un texto de búsqueda automáticamente.
  fields:
    entity_id:
      name: Entidad
      description: La entidad media_player del dispositivo.
      required: true
      selector:
        entity:
          domain: media_player
          integration: pyt_androidtv
    app:
      name: Aplicación
      description: El package ID de la app donde buscar (ej. com.netflix.ninja).
      required: true
      example: "com.netflix.ninja"
      selector:
        text:
    query:
      name: Texto de búsqueda
      description: El texto a buscar dentro de la app.
      required: true
      example: "Mi película favorita"
      selector:
        text:
    delay_s:
      name: Espera antes de escribir (segundos)
      description: Tiempo de espera para que la app cargue antes de escribir.
      default: 3
      selector:
        number:
          min: 1
          max: 15
          mode: slider
          step: 0.5

record_screen:
  name: Grabar Pantalla
  description: Grabar la pantalla del dispositivo y descargar el archivo MP4.
  fields:
    entity_id:
      name: Entidad
      description: La entidad media_player del dispositivo.
      required: true
      selector:
        entity:
          domain: media_player
          integration: pyt_androidtv
    duration_s:
      name: Duración (segundos)
      description: Duración de la grabación (máximo 180 segundos).
      default: 10
      selector:
        number:
          min: 5
          max: 180
          mode: slider
    filename:
      name: Nombre del archivo
      description: Nombre del archivo MP4 de salida.
      default: "screen_recording.mp4"
      selector:
        text:
